services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-loan-postgres
    environment:
      POSTGRES_DB: auto_loan
      POSTGRES_USER: auto_loan
      POSTGRES_PASSWORD: auto_loan_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_loan -d auto_loan"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    container_name: auto-loan-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://auto_loan:auto_loan_dev_password@postgres:5432/auto_loan
      JWT_SECRET_KEY: local-dev-secret-change-me-at-least-32-characters
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    container_name: auto-loan-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: