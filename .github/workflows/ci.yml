name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_to_azure:
        description: "Run optional Azure deployment steps"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  BACKEND_IMAGE_NAME: auto-loan-backend
  FRONTEND_IMAGE_NAME: auto-loan-frontend

jobs:
  python:
    name: Python lint and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest ruff httpx

      - name: Lint backend
        run: ruff check backend

      - name: Run backend tests
        run: pytest backend/tests

  node:
    name: Node build and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - python
      - node

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  azure-deploy:
    name: Optional Azure deployment
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_azure
    environment: azure
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Azure Developer CLI login
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider github \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

      - name: Validate Azure deployment configuration
        shell: bash
        run: |
          if [ ! -f azure.yaml ]; then
            echo "Azure deployment is enabled, but azure.yaml is not present."
            echo "Add azd configuration and infra files before enabling this job for real deployments."
            exit 1
          fi

      - name: Preview Azure deployment
        run: azd provision --preview --no-prompt

      - name: Deploy to Azure
        run: azd up --no-prompt